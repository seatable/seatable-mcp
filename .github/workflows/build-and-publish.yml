name: CI

on:
  push:
    branches: [main]
    tags:
      - "testing-v*.*.*"
      - "release-v*.*.*"
  pull_request:

env:
  IMAGE_NAME: "seatable/seatable-mcp"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test

  # Docker image — only on version tags
  init-vars:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      git_tag_prefix: ${{ steps.extract_prefix.outputs.git_tag_prefix }}
      image_tag_prefix: ${{ steps.set_image_tag_prefix.outputs.image_tag_prefix }}
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref }}" =~ ^refs/tags/(testing|release)-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${{ github.ref }}"
            exit 1
          fi
      - name: Extract prefix (testing or release)
        id: extract_prefix
        run: echo "git_tag_prefix=$(echo ${{ github.ref }} | awk -F/ '{print $3}' | awk -F- '{print $1}')" >> $GITHUB_OUTPUT
      - name: Extract version
        id: extract_version
        run: echo "version=$(echo ${{ github.ref }} | awk -F/ '{print $3}' | awk -Fv '{print $2}')" >> $GITHUB_OUTPUT
      - name: Set image tag prefix
        id: set_image_tag_prefix
        run: |
          if [[ "${{ steps.extract_prefix.outputs.git_tag_prefix }}" == "testing" ]]; then
            echo "image_tag_prefix=testing-" >> $GITHUB_OUTPUT
          else
            echo "image_tag_prefix=" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: init-vars
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Get short SHA
        id: get_commit
        run: echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Set current time
        id: current_time
        run: echo "time=$(date --iso-8601=seconds)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}:commit-${{ steps.get_commit.outputs.short_sha }}"
          TAGS="${TAGS},${{ env.IMAGE_NAME }}:${{ needs.init-vars.outputs.image_tag_prefix }}${{ needs.init-vars.outputs.version }}"
          if [[ "${{ needs.init-vars.outputs.git_tag_prefix }}" == "release" ]]; then
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ needs.init-vars.outputs.image_tag_prefix }}${{ needs.init-vars.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.current_time.outputs.time }}
            org.opencontainers.image.authors=SeaTable
            org.opencontainers.image.url=https://www.seatable.com/
            org.opencontainers.image.documentation=https://github.com/seatable/seatable-mcp
            org.opencontainers.image.vendor=SeaTable

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:commit-${{ steps.get_commit.outputs.short_sha }}"
          format: "table"
          exit-code: "1"
          scanners: "vuln,misconfig"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
